<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="eidBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0d0818"/>
    </linearGradient>
    <linearGradient id="eidGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="eidGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="4" y="4" width="112" height="112" rx="28" ry="28" fill="url(#eidBg)" stroke="rgba(251,191,36,0.15)" stroke-width="1.5"/>

  <!-- Crescent Moon -->
  <g transform="translate(32, 30)" filter="url(#glow)">
    <path d="M28 0 C12 0 0 14 0 32 C0 50 12 64 28 64 C18 58 12 46 12 32 C12 18 18 6 28 0Z" fill="url(#eidGold)" opacity="0.9"/>
  </g>

  <!-- Star -->
  <g transform="translate(48, 26)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Small stars -->
  <circle cx="72" cy="36" r="1.5" fill="#fbbf24" opacity="0.4"/>
  <circle cx="80" cy="48" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="20" cy="48" r="1" fill="#fbbf24" opacity="0.3"/>

  <!-- Braces { } brand mark -->
  <g transform="translate(36, 72)">
    <text x="24" y="0" font-family="serif" font-size="22" font-weight="900" fill="url(#eidGlow)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">
      <tspan fill="#8b5cf6">{</tspan><tspan fill="#fbbf24"> </tspan><tspan fill="#06b6d4">}</tspan>
    </text>
  </g>

  <!-- Subtle gold border glow -->
  <rect x="4" y="4" width="112" height="112" rx="28" ry="28" fill="none" stroke="url(#eidGold)" stroke-width="0.5" opacity="0.3"/>
</svg>
