<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#a277ff">
    <title>إعداد الحساب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="overlay/themes/glassmorphism-3.css">
    <link rel="stylesheet" href="polish-overlay.css">
</head>
<body class="center-content">
    <div id="toast-container"></div>
    
    <div class="login-card glass">
        <div class="logo-center text-center">
            <img src="logo.png" alt="Logo" class="app-logo-login">
            <h2>إعداد الحساب</h2>
        </div>
        <form id="setupForm" onsubmit="event.preventDefault();var p=document.getElementById('setupPass').value;var c=document.getElementById('setupConfirm').value;if(p.length<6){showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل','error');return}if(p!==c){showToast('كلمة المرور غير متطابقة','error');return}var s=JSON.parse(localStorage.getItem('student_session')||'{}');if(!s.id){showToast('يجب تسجيل الدخول أولاً','error');return}var st=JSON.parse(localStorage.getItem('elite_students')||'[]');var idx=st.findIndex(function(x){return x.id===s.id});if(idx>-1){st[idx].password=p;localStorage.setItem('elite_students',JSON.stringify(st));showToast('تم تعيين كلمة المرور بنجاح','success');setTimeout(function(){window.location.href='student.html'},1000)}else{showToast('لم يتم العثور على ملف الطالب','error')}">
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="setupPass" placeholder="كلمة المرور (6 أحرف على الأقل)" required minlength="6">
            </div>
            <div class="input-group mt-10">
                <i class="fas fa-check-double"></i>
                <input type="password" id="setupConfirm" placeholder="تأكيد كلمة المرور" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-20">إنشاء كلمة المرور</button>
        </form>
    </div>
    <script src="app.js"></script>
    <script src="bridge/overlay-engine.js"></script>
</body>
</html>
